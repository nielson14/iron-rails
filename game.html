<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Iron Rails</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --coal:#1a1a1a;--rust:#b94a2c;--brass:#c8922a;--cream:#f5f0e8;
  --steel:#3a4a5c;--smoke:#6b7280;--track:#2d2d2d;--panel:#222;
}
body{background:var(--coal);color:var(--cream);font-family:'Georgia',serif;height:100vh;display:grid;grid-template-rows:auto 1fr auto;overflow:hidden}
header{background:var(--track);border-bottom:2px solid var(--rust);padding:0.6rem 1rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
header h1{font-size:1.1rem;color:var(--cream);letter-spacing:0.06em}
.phase-pill{background:var(--rust);color:var(--cream);font-size:0.65rem;padding:2px 8px;border-radius:2px;font-family:monospace;letter-spacing:0.08em}
.round-info{font-family:monospace;font-size:0.75rem;color:var(--smoke);margin-left:auto}
.main-layout{display:grid;grid-template-columns:1fr 280px;overflow:hidden}
.board-area{overflow:auto;padding:1rem;position:relative}
.sidebar{background:var(--panel);border-left:1px solid #333;display:flex;flex-direction:column;overflow:hidden}
.sidebar-section{padding:0.8rem;border-bottom:1px solid #333}
.sidebar-section h3{font-size:0.7rem;color:var(--smoke);letter-spacing:0.1em;font-family:monospace;margin-bottom:0.5rem}
.player-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #2a2a2a;font-size:0.8rem}
.player-row:last-child{border-bottom:none}
.player-row.active-player{background:#1a1a0a;margin:0 -0.8rem;padding:5px 0.8rem;border-left:2px solid var(--brass)}
.player-row.me{color:var(--cream)}
.color-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.player-name{flex:1;font-size:0.8rem}
.stat{font-family:monospace;font-size:0.75rem;color:var(--smoke)}
.stat strong{color:var(--cream)}
.action-panel{padding:0.8rem;flex:1;overflow-y:auto}
.action-panel h3{font-size:0.7rem;color:var(--smoke);letter-spacing:0.1em;font-family:monospace;margin-bottom:0.7rem}
.action-prompt{font-size:0.85rem;color:var(--cream);line-height:1.5;margin-bottom:0.8rem}
.btn{background:var(--rust);color:var(--cream);border:none;padding:0.5rem 1rem;border-radius:4px;cursor:pointer;font-family:'Georgia',serif;font-size:0.85rem;transition:background 0.15s;width:100%;margin-bottom:6px}
.btn:hover{background:#d4552f}
.btn.secondary{background:var(--steel)}
.btn.secondary:hover{background:#4a5a6c}
.btn.brass{background:var(--brass);color:var(--coal)}
.btn.brass:hover{background:#d9a030}
.btn:disabled{background:#333;color:#666;cursor:not-allowed}
.btn-sm{font-size:0.75rem;padding:3px 8px;width:auto;margin-bottom:0}
.log-area{height:140px;overflow-y:auto;background:#111;border-top:1px solid #333;padding:0.5rem}
.log-entry{font-size:0.72rem;font-family:monospace;color:var(--smoke);padding:2px 0;border-bottom:1px solid #1a1a1a;line-height:1.4}
.log-entry .actor{color:var(--cream)}
.log-entry .highlight{color:var(--brass)}
svg#map{display:block}
.city-hex{cursor:pointer;transition:opacity 0.15s}
.city-hex:hover{opacity:0.85}
.link-line{stroke-width:4;stroke-linecap:round;cursor:pointer;transition:stroke 0.2s}
.link-line.owned{stroke-width:5}
.link-line.claimable{stroke:#555;stroke-dasharray:6 3;cursor:pointer}
.link-line.claimable:hover{stroke:var(--brass)}
.goods-dot{pointer-events:none}
.phase-waiting{text-align:center;padding:1rem;color:var(--smoke);font-size:0.85rem;font-family:monospace;line-height:1.8}
.goods-select{background:#111;border:1px solid #444;color:var(--cream);padding:4px 8px;border-radius:4px;font-family:monospace;font-size:0.8rem;width:100%;margin-bottom:6px}
.score-board{padding:1rem}
.score-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #333;font-size:0.85rem}
.score-row.winner{color:var(--brass);font-size:1rem}
.vp-big{font-family:monospace;font-size:1.1rem;color:var(--brass)}
.shares-stepper{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.shares-stepper span{font-family:monospace;font-size:0.9rem;color:var(--cream);min-width:80px;text-align:center}
.shares-stepper button{width:32px;height:32px;background:#333;border:1px solid #555;color:var(--cream);border-radius:4px;cursor:pointer;font-size:1rem}
.shares-stepper button:hover{background:#444}
@media(max-width:700px){
  .main-layout{grid-template-columns:1fr}
  .sidebar{display:none}
}
</style>
</head>
<body>
<header>
  <h1>Iron Rails</h1>
  <span class="phase-pill" id="phase-pill">Loading</span>
  <span id="my-name-badge" style="font-family:monospace;font-size:0.75rem;color:var(--brass)"></span>
  <span class="round-info" id="round-info"></span>
</header>

<div class="main-layout">
  <div class="board-area">
    <svg id="map" width="660" height="520"></svg>
  </div>

  <div class="sidebar">
    <div class="sidebar-section">
      <h3>Players</h3>
      <div id="player-list"></div>
    </div>
    <div class="action-panel" id="action-panel">
      <h3>Actions</h3>
      <div id="action-content"><div class="phase-waiting">Connecting<span>...</span></div></div>
    </div>
    <div class="log-area" id="log-area"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="game-engine.js"></script>
<script>
const IR = window.IronRails;
firebase.initializeApp(IR.FIREBASE_CONFIG);
const db = firebase.database();

const params = new URLSearchParams(location.search);
const roomCode = params.get('room');
const myId = params.get('pid');
const myName = decodeURIComponent(params.get('name')||'');

document.getElementById('my-name-badge').textContent = myName;

let gameState = null;
let selectedFromCity = null;
let selectedGoodsColor = null;
let movesMade = 0;
let mySharesThisTurn = 0;
let buildsMade = 0;

const CITY_POS = {
  "Pittsburgh":{x:540,y:160},"Cleveland":{x:440,y:120},"Buffalo":{x:530,y:70},
  "Erie":{x:470,y:80},"Toledo":{x:330,y:130},"Detroit":{x:270,y:90},
  "Lansing":{x:220,y:70},"Akron":{x:460,y:170},"Youngstown":{x:510,y:140},
  "Canton":{x:490,y:195},"Columbus":{x:440,y:260},"Wheeling":{x:530,y:220},
  "Dayton":{x:380,y:280},"Cincinnati":{x:350,y:330},"Louisville":{x:310,y:390},
  "Indianapolis":{x:250,y:300},"Muncie":{x:270,y:260},"Ft Wayne":{x:210,y:190},
  "Lima":{x:330,y:200},"Evansville":{x:210,y:390}
};

const GOODS_SVG_COLORS = {
  red:"#e53935",blue:"#1e88e5",purple:"#8e24aa",yellow:"#f9a825",black:"#555"
};

function renderMap(state) {
  const svg = document.getElementById('map');
  svg.innerHTML = '';
  const tier = state ? state.tier : 1;

  const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
  svg.appendChild(defs);

  if(state) {
    state.links.forEach(link => {
      const from = CITY_POS[link.from];
      const to = CITY_POS[link.to];
      if(!from||!to) return;
      const line = document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1',from.x); line.setAttribute('y1',from.y);
      line.setAttribute('x2',to.x); line.setAttribute('y2',to.y);
      line.classList.add('link-line');
      if(link.owner) {
        const ownerColor = state.players[link.owner]?.color || '#888';
        line.setAttribute('stroke', ownerColor);
        line.classList.add('owned');
      } else {
        line.classList.add('claimable');
        if(canBuildNow(state, link)) {
          line.addEventListener('click', () => buildLink(link.id));
          line.setAttribute('title', `Build ${link.from}–${link.to} ($2)`);
        }
      }
      svg.appendChild(line);
    });
  }

  Object.entries(CITY_POS).forEach(([city, pos]) => {
    const color = IR.CITY_COLOR_MAP[city];
    const hexColor = GOODS_SVG_COLORS[color] || '#888';

    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.classList.add('city-hex');
    g.addEventListener('click', () => onCityClick(city));

    const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx', pos.x); circle.setAttribute('cy', pos.y);
    circle.setAttribute('r', 16);
    circle.setAttribute('fill', '#1a1a1a');
    circle.setAttribute('stroke', hexColor);
    circle.setAttribute('stroke-width', selectedFromCity===city ? '3' : '1.5');
    g.appendChild(circle);

    const label = document.createElementNS('http://www.w3.org/2000/svg','text');
    label.setAttribute('x', pos.x); label.setAttribute('y', pos.y - 20);
    label.setAttribute('text-anchor','middle');
    label.setAttribute('fill','#aaa');
    label.setAttribute('font-size','9');
    label.setAttribute('font-family','monospace');
    label.textContent = city;
    g.appendChild(label);

    if(state && state.goods[city]) {
      const goods = state.goods[city];
      goods.slice(0,4).forEach((gc, i) => {
        const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
        const angle = (i / Math.max(goods.length,1)) * Math.PI * 2;
        dot.setAttribute('cx', pos.x + Math.cos(angle)*9);
        dot.setAttribute('cy', pos.y + Math.sin(angle)*9);
        dot.setAttribute('r', 4);
        dot.setAttribute('fill', GOODS_SVG_COLORS[gc] || '#888');
        dot.classList.add('goods-dot');
        g.appendChild(dot);
      });
      if(goods.length > 4) {
        const more = document.createElementNS('http://www.w3.org/2000/svg','text');
        more.setAttribute('x',pos.x+10); more.setAttribute('y',pos.y+4);
        more.setAttribute('fill','#aaa'); more.setAttribute('font-size','8');
        more.textContent='+' + (goods.length-4);
        g.appendChild(more);
      }
    }

    svg.appendChild(g);
  });
}

function canBuildNow(state, link) {
  if(!state) return false;
  if(state.phase !== 'build_track') return false;
  if(state.activePlayer !== myId) return false;
  const rules = IR.TIER_RULES[state.tier];
  if(rules.buildTiles === 0) return false;
  if(buildsMade >= rules.buildTiles) return false;
  return true;
}

function onCityClick(city) {
  if(!gameState) return;
  if(gameState.phase !== 'move_goods') return;
  if(gameState.activePlayer !== myId && !isMyMoveRound()) return;

  if(!selectedFromCity) {
    const goods = gameState.goods[city];
    if(!goods || goods.length === 0) return;
    selectedFromCity = city;
    selectedGoodsColor = goods[0];
    renderMap(gameState);
    renderActionPanel();
  } else if(selectedFromCity === city) {
    selectedFromCity = null;
    selectedGoodsColor = null;
    renderMap(gameState);
    renderActionPanel();
  } else {
    attemptMove(selectedFromCity, city);
  }
}

function isMyMoveRound() {
  return gameState && gameState.phase === 'move_goods' && gameState.moveQueue && gameState.moveQueue.includes(myId);
}

async function attemptMove(fromCity, toCity) {
  if(!gameState) return;
  const paths = IR.findPaths(fromCity, gameState.goods[fromCity][0], gameState.links, gameState.players[myId].engineLevel, gameState.players);
  const validPath = paths.find(p => p[p.length-1] === toCity);
  if(!validPath) {
    showActionMessage("Can't reach that city with your current engine level, or color doesn't match.");
    return;
  }
  const path = [fromCity, ...validPath];
  const newState = IR.moveGoodsAndScore(gameState, myId, fromCity, validPath);
  if(newState.error) { showActionMessage(newState.error); return; }
  selectedFromCity = null;
  selectedGoodsColor = null;
  movesMade++;
  await advanceMovePhase(newState);
}

async function advanceMovePhase(state) {
  const order = state.playerOrder.filter(id => !state.players[id]?.eliminated);
  const currentIdx = order.indexOf(state.activePlayer);

  let newState = JSON.parse(JSON.stringify(state));

  if(!newState.moveRound) newState.moveRound = 1;

  const nextIdx = (currentIdx + 1) % order.length;
  if(nextIdx === 0) {
    if(newState.moveRound >= 2) {
      newState = IR.collectIncome(newState);
      newState = IR.payExpenses(newState);
      newState.phase = 'end_round';
      newState.activePlayer = null;
    } else {
      newState.moveRound = 2;
      newState.activePlayer = order[0];
    }
  } else {
    newState.activePlayer = order[nextIdx];
  }

  await db.ref('rooms/' + roomCode + '/gameState').set(newState);
}

async function buildLink(linkId) {
  if(!gameState) return;
  if(gameState.activePlayer !== myId) return;
  const newState = IR.claimLink(gameState, myId, linkId);
  if(newState.error) { showActionMessage(newState.error); return; }
  buildsMade++;
  const rules = IR.TIER_RULES[newState.tier];
  if(buildsMade >= rules.buildTiles) {
    await advanceBuildPhase(newState);
  } else {
    await db.ref('rooms/' + roomCode + '/gameState').set(newState);
  }
}

async function advanceBuildPhase(state) {
  const order = state.playerOrder.filter(id => !state.players[id]?.eliminated);
  const currentIdx = order.indexOf(state.activePlayer);
  const nextIdx = currentIdx + 1;
  let newState = JSON.parse(JSON.stringify(state));
  if(nextIdx >= order.length) {
    newState.phase = 'move_goods';
    newState.activePlayer = order[0];
    newState.moveRound = 1;
  } else {
    newState.activePlayer = order[nextIdx];
  }
  buildsMade = 0;
  await db.ref('rooms/' + roomCode + '/gameState').set(newState);
}

async function skipBuild() {
  if(!gameState || gameState.activePlayer !== myId) return;
  await advanceBuildPhase(gameState);
}

async function issueShares(count) {
  if(!gameState) return;
  let state = JSON.parse(JSON.stringify(gameState));
  for(let i=0;i<count;i++) {
    const result = IR.issueShare(state, myId);
    if(result.error) { showActionMessage(result.error); break; }
    state = result;
  }
  mySharesThisTurn += count;
  const order = state.playerOrder.filter(id => !state.players[id]?.eliminated);
  const currentIdx = order.indexOf(state.activePlayer);
  if(currentIdx + 1 >= order.length) {
    state.phase = IR.TIER_RULES[state.tier].buildTiles > 0 ? 'build_track' : 'move_goods';
    state.activePlayer = order[0];
    buildsMade = 0;
  } else {
    state.activePlayer = order[currentIdx+1];
  }
  mySharesThisTurn = 0;
  await db.ref('rooms/' + roomCode + '/gameState').set(state);
}

async function endRound() {
  if(!gameState) return;
  let state = JSON.parse(JSON.stringify(gameState));
  state.round++;
  mySharesThisTurn = 0;
  buildsMade = 0;
  movesMade = 0;
  if(state.round > state.totalRounds) {
    state = IR.computeFinalVP(state);
    state.phase = 'ended';
  } else {
    state.phase = 'issue_shares';
    state.activePlayer = state.playerOrder.filter(id=>!state.players[id]?.eliminated)[0];
  }
  await db.ref('rooms/' + roomCode + '/gameState').set(state);
}

function showActionMessage(msg) {
  const el = document.getElementById('action-content');
  const div = document.createElement('div');
  div.style.cssText='color:#f87171;font-size:0.8rem;font-family:monospace;padding:4px 0;';
  div.textContent = '⚠ ' + msg;
  el.prepend(div);
  setTimeout(()=>div.remove(), 3000);
}

function renderActionPanel() {
  if(!gameState) return;
  const state = gameState;
  const el = document.getElementById('action-content');
  const isMe = state.activePlayer === myId;
  const player = state.players[myId];
  const rules = IR.TIER_RULES[state.tier];

  if(state.phase === 'ended') {
    el.innerHTML = renderScoreBoard(state);
    return;
  }

  if(state.phase === 'issue_shares') {
    if(isMe) {
      const max = rules.maxShares - player.shares;
      el.innerHTML = `
        <div class="action-prompt">Issue shares to raise cash.<br>Each share = +$5 now, -$1/round forever.<br>You have ${player.shares}/${rules.maxShares} shares issued.</div>
        ${max > 0 ? `
        <button class="btn brass" onclick="issueShares(1)">Issue 1 share (+$5)</button>
        ${max > 1 ? `<button class="btn brass" onclick="issueShares(2)">Issue 2 shares (+$10)</button>` : ''}
        ` : ''}
        <button class="btn secondary" onclick="issueShares(0)">Issue none — pass</button>
        <div style="font-size:0.75rem;color:var(--smoke);font-family:monospace;margin-top:6px">Cash after: $${player.cash + (0)}</div>
      `;
    } else {
      const waiting = state.players[state.activePlayer]?.name || '...';
      el.innerHTML = `<div class="phase-waiting">Waiting for<br><strong style="color:var(--cream)">${waiting}</strong><br>to issue shares</div>`;
    }
    return;
  }

  if(state.phase === 'build_track') {
    if(rules.buildTiles === 0) {
      advanceBuildPhase(state);
      return;
    }
    if(isMe) {
      const built = buildsMade;
      const max = rules.buildTiles;
      el.innerHTML = `
        <div class="action-prompt">Click an unowned track on the map to claim it for $2.<br>${built}/${max} built this turn.</div>
        <button class="btn secondary" onclick="skipBuild()">Done building</button>
        <div style="font-size:0.75rem;color:var(--smoke);font-family:monospace;margin-top:6px">Cash: $${player.cash}</div>
      `;
    } else {
      el.innerHTML = `<div class="phase-waiting">Waiting for<br><strong style="color:var(--cream)">${state.players[state.activePlayer]?.name}</strong><br>to build track</div>`;
    }
    return;
  }

  if(state.phase === 'move_goods') {
    const order = state.playerOrder.filter(id=>!state.players[id]?.eliminated);
    const isMyTurn = state.activePlayer === myId;
    if(isMyTurn) {
      if(selectedFromCity) {
        const goods = state.goods[selectedFromCity];
        el.innerHTML = `
          <div class="action-prompt">Moving <strong style="color:${GOODS_SVG_COLORS[selectedGoodsColor]}">${selectedGoodsColor}</strong> goods from <strong>${selectedFromCity}</strong>.<br>Click a matching city to deliver.</div>
          <button class="btn secondary" onclick="selectedFromCity=null;selectedGoodsColor=null;renderMap(gameState);renderActionPanel()">Cancel</button>
        `;
      } else {
        el.innerHTML = `
          <div class="action-prompt">Click a city on the map to pick up goods and deliver them.<br>Round ${state.moveRound||1} of 2.</div>
          <button class="btn secondary" onclick="advanceMovePhase(gameState)">Pass this move</button>
          <div style="font-size:0.75rem;color:var(--smoke);font-family:monospace;margin-top:6px">Engine: ${player.engineLevel} links</div>
        `;
      }
    } else {
      el.innerHTML = `<div class="phase-waiting">Waiting for<br><strong style="color:var(--cream)">${state.players[state.activePlayer]?.name}</strong><br>to move goods</div>`;
    }
    return;
  }

  if(state.phase === 'end_round') {
    el.innerHTML = `
      <div class="action-prompt">Round ${state.round} complete.<br>Income collected. Expenses paid.</div>
      <button class="btn brass" onclick="endRound()">Start next round</button>
    `;
    return;
  }
}

function renderScoreBoard(state) {
  const sorted = Object.values(state.players).sort((a,b)=>b.vp-a.vp);
  return `
    <div class="score-board">
      <div style="color:var(--brass);font-size:0.9rem;margin-bottom:1rem;text-align:center">Final Scores</div>
      ${sorted.map((p,i)=>`
        <div class="score-row ${i===0?'winner':''}">
          <span style="display:flex;align-items:center;gap:6px">
            <span style="width:8px;height:8px;border-radius:50%;background:${p.color};display:inline-block"></span>
            ${p.name}${p.id===myId?' (you)':''}
          </span>
          <span class="vp-big">${p.vp} VP</span>
        </div>
      `).join('')}
      <div style="font-size:0.7rem;color:var(--smoke);font-family:monospace;margin-top:1rem;line-height:1.6">
        VP = (income × 3) + track tiles − (shares × 3)
      </div>
    </div>
  `;
}

function renderPlayerList(state) {
  if(!state) return;
  const el = document.getElementById('player-list');
  const order = state.playerOrder.filter(id=>state.players[id]);
  el.innerHTML = order.map(id => {
    const p = state.players[id];
    const isActive = state.activePlayer === id;
    const isMe = id === myId;
    const expenses = IR.calcExpenses(p);
    return `
      <div class="player-row ${isActive?'active-player':''} ${isMe?'me':''}">
        <span class="color-dot" style="background:${p.color}"></span>
        <span class="player-name">${p.name}${isMe?' ★':''}</span>
        <span class="stat">$<strong>${p.cash}</strong></span>
        <span class="stat" style="margin-left:4px">↑<strong>${p.income}</strong></span>
      </div>
    `;
  }).join('');
}

function renderLog(state) {
  if(!state||!state.log) return;
  const el = document.getElementById('log-area');
  el.innerHTML = state.log.slice(0,30).map(entry => {
    if(entry.type==='move') return `<div class="log-entry"><span class="actor">${entry.playerName}</span> moved <span class="highlight">${entry.color}</span> ${entry.from}→${entry.to}</div>`;
    if(entry.type==='build') return `<div class="log-entry"><span class="actor">${entry.playerName}</span> claimed <span class="highlight">${entry.from}–${entry.to}</span></div>`;
    if(entry.type==='share') return `<div class="log-entry"><span class="actor">${entry.playerName}</span> issued share (now ${entry.shares})</div>`;
    if(entry.type==='eliminated') return `<div class="log-entry" style="color:#f87171"><span class="actor">${entry.playerName}</span> went bankrupt</div>`;
    return `<div class="log-entry">${entry.type}</div>`;
  }).join('');
}

function renderHeader(state) {
  if(!state) return;
  const phaseLabels = {
    issue_shares:'Issue shares',build_track:'Build track',
    move_goods:'Move goods',end_round:'Round end',ended:'Game over'
  };
  document.getElementById('phase-pill').textContent = phaseLabels[state.phase]||state.phase;
  document.getElementById('round-info').textContent = `Round ${state.round} of ${state.totalRounds} · Tier ${state.tier}`;
}

function fullRender(state) {
  renderMap(state);
  renderPlayerList(state);
  renderActionPanel();
  renderLog(state);
  renderHeader(state);
}

db.ref('rooms/' + roomCode + '/gameState').on('value', snap => {
  gameState = snap.val();
  if(!gameState) return;
  if(gameState.activePlayer !== myId) {
    buildsMade = 0;
    movesMade = 0;
    selectedFromCity = null;
    selectedGoodsColor = null;
  }
  fullRender(gameState);
});

renderMap(null);
</script>
</body>
</html>
